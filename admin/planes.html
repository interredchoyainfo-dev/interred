<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SPANEL - Planes - Inter Red</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: "#E30613" }, fontfamily: { body: ["Plus Jakarta Sans", "sans-serif"] } } } }
    </script>
</head>
<body class="bg-[#f8fafc] font-body text-slate-800">
    <div id="dashboard" class="min-h-screen flex">
        <aside class="w-72 bg-white border-r border-slate-100 p-8 flex flex-col h-screen sticky top-0">
            <div class="text-red-600 font-black text-3xl italic tracking-tighter mb-12">SPANEL</div>
            <nav class="space-y-2 flex-1">
                <a href="/admin/index.html" class="w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 hover:bg-slate-50 hover:text-slate-900 font-bold transition-all">
                    <span class="material-symbols-outlined">dashboard</span> Inicio
                </a>
                <a href="/admin/contenido.html" class="w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 hover:bg-slate-50 hover:text-slate-900 font-bold transition-all">
                    <span class="material-symbols-outlined">edit_note</span> Contenido Sitio
                </a>
                <a href="/admin/planes.html" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-red-50 text-red-600 font-bold transition-all">
                    <span class="material-symbols-outlined">payments</span> Planes y Precios
                </a>
                <a href="/admin/cobertura.html" class="w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 hover:bg-slate-50 hover:text-slate-900 font-bold transition-all">
                    <span class="material-symbols-outlined">map</span> Cobertura
                </a>
                <a href="/admin/contacto.html" class="w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 hover:bg-slate-50 hover:text-slate-900 font-bold transition-all">
                    <span class="material-symbols-outlined">contact_support</span> Contacto
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-12">
            <header class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="text-3xl font-black text-slate-900 uppercase italic tracking-tighter">Planes y Precios</h2>
                    <p class="text-slate-400 font-medium">Actualiza los montos mensuales de tus servicios.</p>
                </div>
                <button onclick="saveAll()" id="saveBtn" class="bg-red-600 text-white px-10 py-4 rounded-2xl font-black uppercase text-sm hover:bg-red-700 transition-all flex items-center gap-3">
                    <span class="material-symbols-outlined">save</span> Guardar Precios
                </button>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 max-w-5xl">
                <div class="bg-white rounded-[2.5rem] p-10 border border-slate-100 shadow-sm space-y-8">
                    <h3 class="text-xs font-black uppercase tracking-widest text-red-600">Plan Hogar</h3>
                    <div class="relative">
                        <span class="absolute left-8 top-1/2 -translate-y-1/2 font-black text-3xl text-slate-200">$</span>
                        <input type="text" id="priceHogar" class="w-full bg-slate-50 border-0 rounded-2xl pl-16 pr-8 py-6 font-black text-4xl text-slate-800 focus:ring-2 focus:ring-red-600">
                    </div>
                </div>
                <div class="bg-white rounded-[2.5rem] p-10 border border-slate-100 shadow-sm space-y-8">
                    <h3 class="text-xs font-black uppercase tracking-widest text-red-600">Plan Gaming</h3>
                    <div class="relative">
                        <span class="absolute left-8 top-1/2 -translate-y-1/2 font-black text-3xl text-slate-200">$</span>
                        <input type="text" id="priceGaming" class="w-full bg-slate-50 border-0 rounded-2xl pl-16 pr-8 py-6 font-black text-4xl text-slate-800 focus:ring-2 focus:ring-red-600">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-10 right-10 bg-black text-white px-8 py-4 rounded-2xl font-black text-xs translate-y-20 opacity-0 transition-all duration-500 z-[200]">
        Precios actualizados
    </div>

    <script>
        if (!localStorage.getItem('adminAuth')) { location.href = '/admin/index.html'; }
        const API_URL = 'http://localhost:3001/api/cms/config';
        let fullConfig = {};

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                fullConfig = await res.json();
                document.getElementById('priceHogar').value = fullConfig.plans.hogar.price;
                document.getElementById('priceGaming').value = fullConfig.plans.gaming.price;
            } catch (err) { alert('Servidor API no responde'); }
        }

        async function saveAll() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerText = 'GUARDANDO...';
            fullConfig.plans.hogar.price = document.getElementById('priceHogar').value;
            fullConfig.plans.gaming.price = document.getElementById('priceGaming').value;
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fullConfig)
                });
                if (res.ok) { showToast(); }
            } catch (err) { alert('Error al guardar'); } 
            finally { btn.disabled = false; btn.innerText = 'GUARDAR PRECIOS'; }
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => { t.classList.add('translate-y-20', 'opacity-0'); }, 3000);
        }
        loadData();
    </script>
</body>
</html>
